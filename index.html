<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamo</title>
    <style>
        /* Fondo oscuro y tipografía retro */
        body {
            background-color: hsl(241, 91%, 40%);
            color: #c5c6c7;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        /* Tarjeta principal con efecto Neón Cyan */
        .game-card {
            background-color: #1f2833;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #66fcf1;
            box-shadow: 0 0 20px #66fcf1, inset 0 0 10px #66fcf1;
            text-align: center;
            width: 350px;
            transition: all 0.5s ease;
        }

        h1 {
            color: #45a29e;
            text-shadow: 0 0 10px #45a29e;
            font-size: 24px;
        }

        /* Inputs y Botones Neón */
        input {
            background: transparent;
            border: 2px solid #ff007f;
            color: #fff;
            padding: 10px;
            font-size: 18px;
            width: 60%;
            text-align: center;
            border-radius: 5px;
            box-shadow: 0 0 10px hsla(0, 100%, 50%, 0.99);
            outline: none;
            margin-bottom: 15px;
        }

        button {
            background-color: transparent;
            color: #fff;
            border: 2px solid hsl(114, 89%, 39%);
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 0 10px hsl(114, 92%, 44%);
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }

        button:hover {
            background-color: hsl(352, 85%, 38%);
            color: #000;
            box-shadow: 0 0 20px #66fcf1, 0 0 40px #66fcf1;
        }

        button:disabled {
            border-color: #555;
            box-shadow: none;
            color: #555;
            cursor: not-allowed;
        }

        /* Contenedores de texto */
        #mensaje {
            font-size: 18px;
            font-weight: bold;
            margin: 15px 0;
            min-height: 25px;
        }

        #contador, #historial {
            font-size: 14px;
            margin: 10px 0;
            color: #888;
        }

        #btnReiniciar {
            display: none;
            border-color: #fce300;
            box-shadow: 0 0 10px #fce300;
            margin-top: 15px;
        }

        #btnReiniciar:hover {
            background-color: #fce300;
            box-shadow: 0 0 20px #fce300, 0 0 40px #fce300;
        }

        /* Imagen de victoria oculta por defecto */
        #imgVictoria {
            display: none;
            width: 100%;
            border-radius: 10px;
            margin-top: 15px;
            box-shadow: 0 0 20px #00ff00;
        }

        /* Animación para cuando gane */
        @keyframes fiestaNeon {
            0% { box-shadow: 0 0 20px #00ff00, inset 0 0 10px #00ff00; border-color: #00ff00; }
            50% { box-shadow: 0 0 50px #00ff00, inset 0 0 20px #00ff00; border-color: #fff; }
            100% { box-shadow: 0 0 20px #00ff00, inset 0 0 10px #00ff00; border-color: #00ff00; }
        }

        .victoria-efecto {
            animation: fiestaNeon 1s infinite;
        }
    </style>
</head>
<body>

    <div class="game-card" id="game-card">
        <h1>Sweet sahumerio: Adivina un numero entre el 1 y el 100</h1>
        
        <input type="number" id="inputIntento" placeholder="Ej: 42" autocomplete="off">
        <br>
        <button id="btnAdivinar">Ejecutar</button>

        <p id="mensaje"></p>
        <p id="contador">Intentos: 0</p>
        <p id="historial">Historial: -</p>

        <img id="imgVictoria" src="https://media.giphy.com/media/7rj2ZgttvgomY/giphy.gif" alt="Victoria Hacker">

        <br>
        <button id="btnReiniciar">Reiniciar Sistema</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
